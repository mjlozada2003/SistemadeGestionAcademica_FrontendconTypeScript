<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Académica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Sistema de Gestión Académica</h1>
    
    <section id="stats">
        <h3>Estadísticas</h3>
        <p>Total Estudiantes: <span id="stat-est">0</span></p>
    </section>

    <section id="form-est">
        <h3>Registrar Estudiante</h3>
        <form id="est-form">
            <input type="text" id="est-nombre" placeholder="Nombre completo" required>
            <input type="email" id="est-correo" placeholder="Correo" required>
            <input type="number" id="est-edad" placeholder="Edad" required>
            <input type="text" id="est-carrera" placeholder="Carrera" required>
            <button type="submit">Registrar</button>
        </form>
    </section>

    <table>
        <thead><tr><th>Nombre</th><th>Correo</th><th>Estado</th><th>Acción</th></tr></thead>
        <tbody id="tabla-estudiantes"></tbody>
    </table>

    <script type="module" src="./dist/app.js"></script>
</body>
</html>
